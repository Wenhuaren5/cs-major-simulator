<!DOCTYPE html>
<html lang="zh">

<head>
    <!-- 网页基础设置 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 作业实时检测</title>

    <!-- 使用原有样式文件 -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- 返回主页按钮 -->
    <a href="../index.html" class="backButton">
        ← 返回主页
    </a>

    <h1>Stage 1 作业实时检测</h1>

    <p>
        点击每场比赛的获胜队伍，后续将根据真实赛果计算你的作业通过率。
    </p>

    <hr>

    <!-- 页面主体：左边填写作业，右边显示比赛对阵 -->
    <div class="testLayout">

        <!-- 左侧：用户填写自己的 Pick'Em 作业 -->
        <div class="pickemPanel">

            <h2>我的作业</h2>

            <h3>3-0</h3>

            <div class="pickRow">

                <select class="pickSelect threeZeroPick"></select>

                <select class="pickSelect threeZeroPick"></select>

            </div>
            <h3>3-1/3-2</h3>

            <div class="pickRow">

                <select class="pickSelect advancePick"></select>

                <select class="pickSelect advancePick"></select>

            </div>

            <div class="pickRow">

                <select class="pickSelect advancePick"></select>

                <select class="pickSelect advancePick"></select>

            </div>

            <div class="pickRow">

                <select class="pickSelect advancePick"></select>

                <select class="pickSelect advancePick"></select>

            </div>
            
            <h3>0-3</h3>

            <div class="pickRow">

                <select class="pickSelect zeroThreePick"></select>

                <select class="pickSelect zeroThreePick"></select>

            </div>

            <!-- 保存 / 导入作业 -->
            <button id="savePickemButton">保存作业</button>
            <button id="loadPickemButton">导入作业</button>

            <!-- 保存 / 导入后的提示 -->
            <span id="pickemMessage" class="fadeMessage"></span>

        </div>

        <!-- 右侧：瑞士轮三列显示区域 -->
        <div class="roundsLayout">

            <!-- 第一列：Round 1 -->
            <div class="roundColumn">

                <h2>Round 1</h2>

                <div id="matchContainer"></div>

            </div>

            <!-- 第二列：Round 2 -->
            <div class="roundColumn">

                <h2>Round 2</h2>

                <div id="round2PoolContainer"></div>

            </div>

            <!-- 第三列：Round 3 -->
            <div class="roundColumn">

                <h2>Round 3</h2>

                <div id="round3Container">

                        <p class="ratingTip">
                        等待 Round 2 结果
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script>
        // =========================
        // Stage 1 第一轮对阵
        // =========================
        const firstRoundMatches = [
            ["GamerLegion", "NRG"],
            ["B8", "TYLOO"],
            ["HEROIC", "Sharks"],
            ["BetBoom", "Gaimin Gladiators"],
            ["BIG", "Liquid"],
            ["M80", "Lynn Vision"],
            ["MIBR", "Thunder dOWNUNDER"],
            ["SINNERS", "FlyQuest"]
        ];

        // =========================
        // HLTV Simulator 内部种子顺序
        // 用于后续瑞士轮配对
        // =========================
        const seedOrder = {
            "GamerLegion": 1,
            "B8": 2,
            "HEROIC": 3,
            "BetBoom": 4,
            "BIG": 5,
            "M80": 6,
            "MIBR": 7,
            "SINNERS": 8,
            "NRG": 9,
            "TYLOO": 10,
            "Sharks": 11,
            "Gaimin Gladiators": 12,
            "Liquid": 13,
            "Lynn Vision": 14,
            "Thunder dOWNUNDER": 15,
            "FlyQuest": 16
        };

        // 获取对阵显示区域
        const matchContainer = document.getElementById("matchContainer");

        // 获取 Round 2 分组显示区域
        const round2PoolContainer =
            document.getElementById("round2PoolContainer");

        // =========================
        // Stage 1 所有队伍
        // =========================

        const stage1Teams = [

            "B8",
            "BetBoom",
            "BIG",

            "FlyQuest",

            "Gaimin Gladiators",
            "GamerLegion",

            "HEROIC",

            "Liquid",
            "Lynn Vision",

            "M80",
            "MIBR",

            "NRG",

            "Sharks",
            "SINNERS",

            "Thunder dOWNUNDER",
            "TYLOO"
        ];

        // 获取所有 Pick'Em 下拉框
        const pickSelects =
            document.querySelectorAll(".pickSelect");

        // =========================
        // 更新所有 Pick'Em 下拉框选项
        // 已经被其他框选走的队伍，不再出现在当前下拉框里
        // =========================
        function updatePickOptions() {

            // 记录每个下拉框当前选中的值
            const currentValues = [];

            pickSelects.forEach(select => {

                currentValues.push(select.value);
            });

            // 记录所有已经被选中的队伍
            const selectedTeams = currentValues.filter(value => {

                return value !== "";
            });

            // 重新生成每一个下拉框
            pickSelects.forEach((select, index) => {

                const currentValue = currentValues[index];

                // 先清空旧选项
                select.innerHTML = `
                    <option value="">选择队伍</option>
                `;

                stage1Teams.forEach(team => {

                    // 如果这支队伍没有被别人选中，或者它就是当前框自己的选择，就保留
                    if (
                        !selectedTeams.includes(team) ||
                        team === currentValue
                    ) {

                        select.innerHTML += `
                            <option value="${team}">
                                ${team}
                            </option>
                        `;
                    }
                });

                // 重新恢复当前下拉框原本选择的队伍
                select.value = currentValue;
            });
        }

        // =========================
        // 每次用户修改 Pick'Em 选择时，刷新所有下拉框
        // =========================
        pickSelects.forEach(select => {

            select.addEventListener("change", () => {

                updatePickOptions();
            });
        });

        // =========================
        // 页面打开时初始化下拉框
        // =========================
        updatePickOptions();

        // =========================
        // 获取保存 / 导入作业按钮
        // =========================
        const savePickemButton =
            document.getElementById("savePickemButton");

        const loadPickemButton =
            document.getElementById("loadPickemButton");

        // 获取保存 / 导入后的提示文字
        const pickemMessage =
            document.getElementById("pickemMessage");


        // =========================
        // 显示保存 / 导入成功提示
        // =========================
        function showPickemMessage(message) {

            pickemMessage.textContent = message;

            pickemMessage.style.opacity = "1";

            setTimeout(() => {

                pickemMessage.style.opacity = "0";

            }, 1500);
        }


        // =========================
        // 保存用户当前填写的 Pick'Em 作业
        // =========================
        savePickemButton.addEventListener("click", () => {

            const pickemData = {

                threeZero: Array.from(
                    document.querySelectorAll(".threeZeroPick")
                ).map(select => select.value),

                advance: Array.from(
                    document.querySelectorAll(".advancePick")
                ).map(select => select.value),

                zeroThree: Array.from(
                    document.querySelectorAll(".zeroThreePick")
                ).map(select => select.value)
            };

            localStorage.setItem(
                "stage1Pickem",
                JSON.stringify(pickemData)
            );

            showPickemMessage("已保存！");
        });


        // =========================
        // 导入之前保存的 Pick'Em 作业
        // =========================
        loadPickemButton.addEventListener("click", () => {

            const savedPickem =
                localStorage.getItem("stage1Pickem");

            if (!savedPickem) {

                showPickemMessage("没有找到");

                return;
            }

            const pickemData =
                JSON.parse(savedPickem);

            document.querySelectorAll(".threeZeroPick")
                .forEach((select, index) => {

                    select.value = pickemData.threeZero[index] || "";
                });

            document.querySelectorAll(".advancePick")
                .forEach((select, index) => {

                    select.value = pickemData.advance[index] || "";
                });

            document.querySelectorAll(".zeroThreePick")
                .forEach((select, index) => {

                    select.value = pickemData.zeroThree[index] || "";
                });

            // 导入后刷新下拉框，避免重复队伍重新出现
            updatePickOptions();

            showPickemMessage("已导入！");
        });

        // =========================
        // 页面打开后自动显示第一轮对阵
        // =========================
        firstRoundMatches.forEach(match => {
            const teamA = match[0];
            const teamB = match[1];

            matchContainer.innerHTML += `
                <div class="matchRow">
                    <button class="teamButton">${teamA}</button>

                    <span class="vsText">VS</span>

                    <button class="teamButton">${teamB}</button>
                </div>
            `;
        });

        // =========================
        // 保存 Round 1 的比赛结果
        // =========================

        let round1Results = {};

        // =========================
        // 点击队伍选择胜者
        // =========================

        document
            .querySelectorAll(".matchRow")
            .forEach((row, index) => {

                const buttons =
                    row.querySelectorAll(
                    ".teamButton"
                );

                const teamA =
                    buttons[0];

                const teamB =
                    buttons[1];

                teamA.addEventListener(
                    "click",
                    () => {

                        teamA.classList.add(
                            "winnerButton"
                        );

                        teamA.classList.remove(
                            "loserButton"
                        );

                        teamB.classList.add(
                            "loserButton"
                        );

                        teamB.classList.remove(
                            "winnerButton"
                        );

                        // 记录这一场的胜者
                        round1Results[`match${index}`] =
                            teamA.textContent.trim();
                            updateRound2Pools();

                        console.log(round1Results);
                    }
                );

                teamB.addEventListener(
                    "click",
                    () => {

                        teamB.classList.add(
                            "winnerButton"
                        );

                        teamB.classList.remove(
                            "loserButton"
                        );

                        teamA.classList.add(
                            "loserButton"
                        );

                        teamA.classList.remove(
                            "winnerButton"
                        );

                        // 记录这一场的胜者
                        round1Results[`match${index}`] =
                            teamB.textContent.trim();
                            updateRound2Pools();

                        console.log(round1Results);
                    }
                );
            });

        // =========================
        // 按种子顺序排序队伍
        // =========================
        function sortTeamsBySeed(teams) {

            return [...teams].sort((a, b) => {

                return seedOrder[a] - seedOrder[b];
            });
        }

        // =========================
        // 高种子 vs 低种子配对
        // 例如 1,2,3,4,5,6,7,8
        // 变成 1vs8, 2vs7, 3vs6, 4vs5
        // =========================
        function createSeedMatchups(teams) {

            const sortedTeams =
                sortTeamsBySeed(teams);

            let matchups = [];

            for (let i = 0; i < sortedTeams.length / 2; i++) {

                matchups.push([
                    sortedTeams[i],
                    sortedTeams[sortedTeams.length - 1 - i]
                ]);
            }

            return matchups;
        }

        // =========================
        // 根据 Round 1 结果生成 1-0 和 0-1 分组
        // =========================
        function updateRound2Pools() {

            // 保存 1-0 队伍
            let oneZeroTeams = [];

            // 保存 0-1 队伍
            let zeroOneTeams = [];

            // 遍历第一轮所有对阵
            firstRoundMatches.forEach((match, index) => {

                const teamA = match[0];
                const teamB = match[1];

                const winner =
                    round1Results[`match${index}`];

                // 这一场还没选胜者
                if (!winner) {

                    return;
                }

                // 输者就是另一支队伍
                const loser =
                    winner === teamA ? teamB : teamA;

                oneZeroTeams.push(winner);

                zeroOneTeams.push(loser);
            });

            // =========================
            // 根据队伍列表生成对阵 HTML
            // 按 HLTV 种子逻辑：高种子 vs 低种子
            // =========================
            function createMatchupsHTML(teams) {

                const matchups =
                    createSeedMatchups(teams);

                let html = "";

                matchups.forEach(match => {

                    const teamA = match[0];
                    const teamB = match[1];

                    html += `

                        <div class="matchRow">

                            <button class="teamButton">
                                ${teamA}
                            </button>

                            <span class="vsText">
                                VS
                            </span>

                            <button class="teamButton">
                                ${teamB}
                            </button>

                        </div>

                    `;
                });

                return html;
            }

            // =========================
            // 显示 Round 2 对阵
            // =========================
            round2PoolContainer.innerHTML = `

                <div class="roundGroup">

                    <h3>1-0</h3>

                    ${createMatchupsHTML(oneZeroTeams)}

                </div>

                <div class="roundGroup">

                    <h3>0-1</h3>

                    ${createMatchupsHTML(zeroOneTeams)}

                </div>

            `;
        }
    </script>

</body>

</html>
