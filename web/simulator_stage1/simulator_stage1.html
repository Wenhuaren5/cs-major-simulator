<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major瑞士轮模拟器</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <a href="../index.html" class="backButton">
        ← 返回主页
    </a>

    <h1>科隆Major瑞士轮模拟器</h1>

    <div class="mainLayout">

        <div class="leftPanel">

            <p>
                输入第一轮对阵，然后生成队伍。
            </p>

            <div id="matches">

                <h2>Round 1 Matchups</h2>

                <div class="match">
                    <span class="matchLabel">第一组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第二组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第三组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第四组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第五组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第六组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第七组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

                <div class="match">
                    <span class="matchLabel">第八组：</span>
                    <input type="text" placeholder="Team A">
                    VS
                    <input type="text" placeholder="Team B">
                </div>

            </div>

            <button id="stage1Button">
                自动填入 Stage 1
            </button>

            <button id="generateButton">
                生成队伍
            </button>

        </div>

        <div class="rightPanel">

            <div id="teamList"></div>

        </div>

    </div>

    <div class="bottomLayout">

        <div id="resultPanel"></div>

        <div id="recommendPanel"></div>

    </div>

    <script src="../js/simulation.js"></script>

    <script src="./script_simulator_stage1.js"></script>

</body>

</html>
