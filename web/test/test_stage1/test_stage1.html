<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 Test Lab</title>

    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

    <a href="../../index.html" class="backButton">
        ← Back Home
    </a>

    <main class="testContainer">

        <h1>Stage 1 Test Lab</h1>

        <p class="subtitle">
            Manual Swiss pairing test for Stage 1
        </p>

        <div class="swissBoard">

            <section class="roundColumn">
                <h2>Round 1</h2>

                <div id="zeroZero" class="recordBox">
                    <h3>0-0</h3>
                </div>
            </section>

            <section class="roundColumn">
                <h2>Round 2</h2>

                <div id="oneZero" class="recordBox">
                    <h3>1-0</h3>
                </div>

                <div id="zeroOne" class="recordBox">
                    <h3>0-1</h3>
                </div>
            </section>

            <section class="roundColumn">
                <h2>Round 3</h2>

                <div id="twoZero" class="recordBox">
                    <h3>2-0</h3>
                </div>

                <div id="oneOne" class="recordBox">
                    <h3>1-1</h3>
                </div>

                <div id="zeroTwo" class="recordBox">
                    <h3>0-2</h3>
                </div>
            </section>

            <section class="roundColumn">
                <h2>Round 4</h2>

                <div id="threeZero" class="qualifiedBox">
                    <h3>3-0</h3>
                </div>

                <div id="twoOne" class="recordBox">
                    <h3>2-1</h3>
                </div>

                <div id="oneTwo" class="recordBox">
                    <h3>1-2</h3>
                </div>

                <div id="zeroThree" class="eliminatedBox">
                    <h3>0-3</h3>
                </div>
            </section>

            <section class="roundColumn">
                <h2>Round 5</h2>

                <div id="advancedFinal" class="qualifiedBox">
                    <h3>晋级</h3>
                </div>

                <div id="twoTwo" class="recordBox">
                    <h3>2-2</h3>
                </div>

                <div id="eliminatedFinal" class="eliminatedBox">
                    <h3>淘汰</h3>
                </div>
            </section>

        </div>

    </main>

    <script src="../../js/simulation.js"></script>
    <script src="./script_test_stage1.js"></script>

</body>

</html>
